name: tdd-subagent
version: 1
description: |
  TDD-disciplined workflow with subagent-driven execution and two-stage review.
  Inlines a subagent-driven-development discipline: per-task fresh subagent
  dispatch, spec compliance review (Stage 1), then code quality review (Stage 2),
  with fix-loops between stages. No worktree isolation.

  Inlined disciplines (self-contained; no external plugin required):
    - Test-first commitment via test-plan.md
    - RED -> GREEN -> REFACTOR enforcement inside each Implementer subagent
    - Two-stage review per task (spec compliance → code quality), with fix-loops
    - Per-role model selection recorded in execution-plan.md
    - Sized ASCII overview (incl. UI mockups for frontend work)

  Output language is controlled by openspec/config.yaml `context:`
  (see OpenSpec docs/multi-language.md), not by this schema.

