name: tdd-sequential-worktree
version: 1
description: |
  TDD-disciplined sequential workflow with isolated git worktree.
  Single-agent, in-order execution inside a dedicated worktree branch.
  Suitable for small-to-medium changes that must not contaminate the
  current working tree.

  Inlined disciplines (self-contained; no external plugin required):
    - Test-first commitment via test-plan.md
    - RED -> GREEN -> REFACTOR enforcement in apply.instruction
    - Sized ASCII overview (incl. UI mockups for frontend work)
    - Isolated worktree per change (git-worktree isolation discipline);
      environment.md records branch, setup, baseline, teardown

  Output language is controlled by openspec/config.yaml `context:`
  (see OpenSpec docs/multi-language.md), not by this schema.

